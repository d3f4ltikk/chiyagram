<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>чияграмм</title>
    <style>
        body { font-family: Arial; margin: 0; padding: 20px; background: #e0f2e9; }
        #login-screen { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 30px; }
        #chat-main { max-width: 500px; margin: 0 auto; background: white; border-radius: 30px; overflow: hidden; display: none; }
        input, button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 30px; border: 1px solid #ccc; font-size: 16px; }
        button { background: #1e6b58; color: white; border: none; cursor: pointer; }
        .message { padding: 10px; margin: 5px; border-radius: 10px; }
        .my-message { background: #dcf8c6; text-align: right; }
        .other-message { background: #f0f0f0; }
        #messages-area { height: 400px; overflow-y: auto; padding: 10px; background: #f9f9f9; }
    </style>
    <!-- ПРАВИЛЬНЫЕ ссылки на Firebase для браузера -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div id="login-screen">
        <h1 style="text-align:center; color:#1e6b58;">чияграмм</h1>
        <input type="text" id="login-username" placeholder="логин" value="Гость">
        <input type="password" id="login-password" placeholder="пароль">
        <button id="login-btn">войти</button>
        <div id="login-error" style="color:red; text-align:center;"></div>
    </div>

    <div id="chat-main">
        <div style="padding:15px; background:#e6f3ed;">
            <h2 style="margin:0;">чияграмм</h2>
        </div>
        <div id="messages-area"></div>
        <form id="message-form" style="padding:15px; display:flex;">
            <input type="text" id="message-input" style="flex:1; margin-right:10px;" placeholder="сообщение">
            <button type="submit" style="width:auto;">→</button>
        </form>
    </div>

    <script>
        // ВАШИ КЛЮЧИ
        const firebaseConfig = {
            apiKey: "AIzaSyC6SDTi2p5cJ-dB7CsoWoOHOIEKr6Slv3w",
            authDomain: "chiyagram-chat.firebaseapp.com",
            databaseURL: "https://chiyagram-chat-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chiyagram-chat",
            storageBucket: "chiyagram-chat.firebasestorage.app",
            messagingSenderId: "310131804413",
            appId: "1:310131804413:web:9d010ff786771a67aa9694"
        };

        // Инициализация
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const messagesRef = database.ref('messages');

        console.log("Firebase OK");

        // Элементы
        const loginScreen = document.getElementById('login-screen');
        const chatMain = document.getElementById('chat-main');
        const loginBtn = document.getElementById('login-btn');
        const username = document.getElementById('login-username');
        const password = document.getElementById('login-password');
        const loginError = document.getElementById('login-error');
        const messagesArea = document.getElementById('messages-area');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');

        let currentUser = { name: 'Гость', id: 'user_' + Date.now() };

        // Кнопка входа
        loginBtn.onclick = function() {
            console.log("Кнопка нажата!");
            loginError.textContent = "";
            
            currentUser.name = username.value || 'Гость';
            
            // Показываем чат
            loginScreen.style.display = 'none';
            chatMain.style.display = 'block';
            
            // Добавляем системное сообщение
            const sysMsg = document.createElement('div');
            sysMsg.style.textAlign = 'center';
            sysMsg.style.color = '#1e6b58';
            sysMsg.style.padding = '10px';
            sysMsg.textContent = '✨ ' + currentUser.name + ' присоединился к чату ✨';
            messagesArea.appendChild(sysMsg);
            
            // Сохраняем в Firebase
            messagesRef.push({
                sender: 'Система',
                text: currentUser.name + ' присоединился',
                time: new Date().toLocaleTimeString(),
                system: true
            });
        };

        // Слушаем сообщения из Firebase
        messagesRef.on('child_added', (snapshot) => {
            const msg = snapshot.val();
            if (!msg.system) {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message ' + (msg.sender === currentUser.name ? 'my-message' : 'other-message');
                msgDiv.innerHTML = '<small>' + msg.sender + ' ' + msg.time + '</small><br>' + msg.text;
                messagesArea.appendChild(msgDiv);
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }
        });

        // Отправка сообщения
        messageForm.onsubmit = function(e) {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (text) {
                messagesRef.push({
                    sender: currentUser.name,
                    text: text,
                    time: new Date().toLocaleTimeString()
                });
                messageInput.value = '';
            }
        };
    </script>
</body>
</html>
